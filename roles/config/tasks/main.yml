---
- name: Gather the package facts
  ansible.builtin.package_facts:
  tags: always

# Preparation tasks: backup, removals
- name: Import Tasks from preparation.yml
  ansible.builtin.import_tasks:
    file: preparation.yml
  tags: config

- name: Copy new files and directories
  ansible.posix.synchronize:
    src: "{{ item }}"
    dest: "~/"
    owner: false
    group: false
  loop:
    - ".config"
    - ".face"
    - ".gtkrc-2.0"
    - ".local"
    - ".ssh"
    - "scripts"
  tags: config

- name: Copy new files and directories (root)
  ansible.posix.synchronize:
    src: "{{ item }}"
    dest: "/"
    owner: false
    group: false
  loop:
    - "etc"
    - "usr"
  become: true
  tags: config

- name: Check if KDE files exist
  ansible.builtin.stat:
    path: "{{ ansible_env['HOME'] }}/.config/kwinoutputconfig.json"
  register: kde_files
  tags: config

