- name: x86_64 | Copy files (root)
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/pacman.conf"
  loop:
    - "etc/pacman-x86_64.conf"
  when: ansible_architecture == "x86_64"
  become: true
  tags: config

- name: Symlink xdg environment variables
  ansible.builtin.file:
    src: "~/.config/user-dirs.dirs"
    dest: "~/.config/environment.d/user-dirs.dirs.conf"
    state: "link"
  tags: config

- name: Create flatpak overrides
  ansible.builtin.command: "flatpak override --user {{ item }}"
  changed_when: true
  loop:
    - "--filesystem=~/.themes:ro" # correct gtk/qt theme
    - "--filesystem=xdg-config/kcminputrc:ro" # correct cursor theme https://github.com/flatpak/flatpak/issues/709#issuecomment-2133355601
    - "--socket=wayland"

# bash cat async
- name: Import Tasks from async_bash_cat.yml
  ansible.builtin.import_tasks:
    file: async_bash_cat.yml
  async: 600
  poll: 0
  register: async_bash_cat
  tags: config

# fish async
- name: Import Tasks from async_fish.yml
  ansible.builtin.import_tasks:
    file: async_fish.yml
  async: 600
  poll: 0
  register: async_fish
  tags: config

# systemd async
- name: Import Tasks from async_systemd.yml
  ansible.builtin.import_tasks:
    file: async_systemd.yml
  async: 600
  poll: 0
  register: async_systemd
  tags: config

- name: Create groups
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop:
    - video # backlight
    - render # GPU passing
    - wireguard # wireguard
  become: true
  tags: config

- name: Add user to groups
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups:
      - video # backlight
      - render # GPU passing
      - wireguard # wireguard
    append: true
  become: true
  tags: config

- name: Symlink systemd-resolved config file for /etc/resolv.conf
  ansible.builtin.file:
    src: "/run/systemd/resolve/stub-resolv.conf"
    dest: "/etc/resolv.conf"
    state: link
    force: true
  become: true
  tags: config

- name: Set sudoers.d permissions
  ansible.builtin.file:
    path: /etc/sudoers.d
    mode: "600"
    owner: root
    group: root
    recurse: true
  become: true
  tags: config

- name: Make scripts executable
  ansible.builtin.file:
    path: "{{ item }}"
    mode: u+x,g+x,o+x
    recurse: true
  loop:
    - "~/scripts"
  tags: config

- name: Import Tasks from plasma.yml
  ansible.builtin.import_tasks:
    file: plasma.yml
  tags: config

# Async task callbacks
- name: Import Tasks from async_check.yml
  ansible.builtin.import_tasks:
    file: async_check.yml
  tags: config
