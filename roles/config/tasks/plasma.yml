## Get theme and icons
# - name: Plasma | Get desktop theme
#   ansible.builtin.git:
#     repo: https://github.com/EliverLara/Sweet-kde
#     dest: "~/.local/share/plasma/desktoptheme/Sweet/"
#   tags: config

- name: Plasma | Get desktop theme
  ansible.builtin.unarchive:
    src: https://github.com/EliverLara/Sweet-kde/archive/refs/heads/master.zip
    dest: "{{ tempdir.path }}/plasma/desktoptheme/"
    remote_src: true
  tags: config

- name: Plasma | Copy desktop theme (root)
  ansible.builtin.copy:
    src: "{{ tempdir.path }}/plasma/desktoptheme/Sweet-kde-master/"
    dest: "/usr/share/plasma/desktoptheme/Sweet/"
    remote_src: true
  become: true
  tags: config

# - name: Plasma | Get theme
#   ansible.builtin.git:
#     repo: https://github.com/EliverLara/Sweet
#     version: nova
#     dest: "~/.themes/Sweet-Dark/"
#   tags: config

- name: Plasma | Get theme
  ansible.builtin.unarchive:
    src: https://github.com/EliverLara/Sweet/archive/refs/heads/nova.zip
    dest: "{{ tempdir.path }}/themes/"
    remote_src: true
  tags: config

# mainly for Flatpak, which can't use the theme any other way
- name: Plasma | Copy theme
  ansible.builtin.copy:
    src: "{{ tempdir.path }}/themes/Sweet-nova"
    dest: "~/.themes/"
    remote_src: true
  tags: config

- name: Plasma | Copy theme (root)
  ansible.builtin.copy:
    src: "{{ tempdir.path }}/themes/Sweet-nova"
    dest: "/usr/share/themes/"
    remote_src: true
  become: true
  tags: config

# - name: Plasma | Get icons
#   ansible.builtin.git:
#     repo: https://github.com/PapirusDevelopmentTeam/papirus-icon-theme
#     dest: "~/.local/share/icons/"
#   tags: config

- name: Plasma | Get icons
  ansible.builtin.unarchive:
    src: https://github.com/PapirusDevelopmentTeam/papirus-icon-theme/archive/refs/heads/master.zip
    dest: "{{ tempdir.path }}/icons/"
    remote_src: true
  tags: config

- name: Plasma | Copy icons (root)
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/usr/share/icons/"
    remote_src: true
  loop:
    - "{{ tempdir.path }}/icons/papirus-icon-theme-master/Papirus"
    - "{{ tempdir.path }}/icons/papirus-icon-theme-master/Papirus-Dark"
    - "{{ tempdir.path }}/icons/papirus-icon-theme-master/Papirus-Light"
  become: true
  tags: config

- name: Plasma | Copy files (root)
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
  loop:
    - src: "/usr/share/themes/Sweet-nova/kde/colorschemes/Sweet.colors"
      dest: "/usr/share/color-schemes/Sweet.colors"
    - src: "/usr/share/themes/Sweet-nova/kde/look-and-feel/"
      dest: "/usr/share/plasma/look-and-feel/Sweet/"
  become: true
  tags: config

## Set theme, colorscheme, cursor
- name: Plasma | Set cursor theme
  ansible.builtin.command: "plasma-apply-cursortheme Breeze_Light"
  tags: config

- name: Plasma | Set colorscheme
  ansible.builtin.command: "plasma-apply-colorscheme Sweet"
  tags: config

- name: Plasma | Set desktop theme
  ansible.builtin.command: "plasma-apply-desktoptheme Sweet"
  tags: config

## Plasma wallpaper
- name: Plasma | Check if wallpaper exists
  ansible.builtin.stat:
    path: "/etc/wallpaper.jpg"
  register: wallpaper
  tags: config

- name: Plasma | Apply wallpaper everywhere
  when: wallpaper.stat.exists
  tags: config
  block:
    # - name: Plasma | Remove previously set wallpapers
    #   ansible.builtin.shell: |
    #     kwriteconfig6 --file ~/.config/plasma-org.kde.plasma.desktop-appletsrc --group Containments --group 1 --group Wallpaper --group org.kde.image --group General --key Image --delete
