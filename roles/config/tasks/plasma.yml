    - name: Plasma | Set Lockscreen wallpaper
      ansible.builtin.shell: |
        kwriteconfig6 --file ~/.config/kscreenlockerrc --group Greeter --group Wallpaper --group org.kde.image --group General --key Image '/etc/wallpaper.jpg'
        kwriteconfig6 --file ~/.config/kscreenlockerrc --group Greeter --group Wallpaper --group org.kde.image --group General --key PreviewImage '/etc/wallpaper.jpg'
      changed_when: true

# Plasma login
- name: Check if KDE files exist
  ansible.builtin.stat:
    path: "{{ lookup('ansible.builtin.env', 'HOME') }}/.config/kwinoutputconfig.json"
  register: kde_files
  tags: config

- name: Copy config for Plasma login (root)
  ansible.builtin.copy:
    src: "{{ lookup('ansible.builtin.env', 'HOME') }}/{{ item }}"
    dest: "/var/lib/plasmalogin/.config/"
    owner: plasmalogin
    group: plasmalogin
    remote_src: true
  loop:
    - ".config/kwinoutputconfig.json"
    - ".config/kcminputrc"
  when: kde_files.stat.exists
  become: true
  tags: config

- name: Copy wallpaper for Plasma login (root)
  ansible.builtin.copy:
    src: "{{ background_image }}"
    dest: "/var/lib/plasmalogin/wallpapers/wallpaper.jpg"
    owner: plasmalogin
    group: plasmalogin
    remote_src: true
  become: true
  tags: config

