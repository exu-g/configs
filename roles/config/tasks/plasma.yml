---
- name: Plasma | Create temporary download directory
  ansible.builtin.tempfile:
    state: directory
    prefix: "ansible.config."
  register: tempdir
  tags: config

- name: Plasma | Create temporary download structure
  ansible.builtin.file:
    path: "{{ tempdir.path }}/{{ item }}"
    state: "directory"
  loop:
    - "icons"
    - "plasma/desktoptheme"
    - "themes"
  tags: config

- name: Plasma | Copy wallpaper to global location (root)
  ansible.builtin.copy:
    src: "{{ background_image }}"
    dest: "/etc/wallpaper.jpg"
    remote_src: true
  become: true
  tags: config

