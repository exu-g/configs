    #   tags: config

    - name: Plasma | Set desktop wallpaper
      ansible.builtin.command: 'plasma-apply-wallpaperimage "/etc/wallpaper.jpg"'
      changed_when: true

    # - name: Plasma | Set desktop wallpaper
