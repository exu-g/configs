- name: x86_64 | Copy files (root)
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/pacman.conf"
    owner: root
    group: root
    mode: "0644"
  loop:
    - "etc/pacman-x86_64.conf"
  when: ansible_facts['architecture'] == "x86_64"
  become: true
  tags: config
