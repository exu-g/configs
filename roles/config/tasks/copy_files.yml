---
- name: Copy new files and directories
  ansible.posix.synchronize:
    src: "{{ item }}"
    dest: "~/"
    owner: false
    group: false
  loop:
    - ".config"
    - ".face"
    - ".gtkrc-2.0"
    - ".local"
    - ".ssh"
    - "scripts"
  tags: config

- name: Copy new files and directories (root)
  ansible.posix.synchronize:
    src: "{{ item }}"
    dest: "/"
    owner: false
    group: false
  loop:
    - "etc"
    - "usr"
  become: true
  tags: config

